<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InChI Explorer</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@rdkit/rdkit/dist/RDKit_minimal.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>
</head>

<body>

<div class="container">

<div class="panel">
    <div class="title">InChI Identity Levels Comparison</div></br>

    <div class="tabs">
        <button class="tab active" data-mode="compare">Compare</button>
        <button class="tab" data-mode="advanced">Advanced</button>
        <button class="tab" data-mode="files">Files</button>
    </div>

    <div id="mode-compare" class="tab-content active">
        <textarea id="inchi1" placeholder="Molecule A (InChI)"></textarea>
        <textarea id="inchi2" placeholder="Molecule B (InChI)"></textarea>
        <button onclick="compare()">Compare</button>
    </div>

    <div id="mode-advanced" class="tab-content">
        <textarea id="inchi1" placeholder="Molecule A (InChI)"></textarea>
        <textarea id="inchi2" placeholder="Molecule B (InChI)"></textarea>

        <button onclick="compare(true)">Compare</button>
    </div>

    <div id="mode-files" class="tab-content">
        <p class="muted">File upload coming soon</p>
    </div>
</div>

<div class="panel">
    <div class="center">
        <div class="molecule-card">
            <div class="molecule-header">Molecule A</div>
            <div id="mol1" class="molecule"></div>
        </div>
        <div class="molecule-card">
            <div class="molecule-header">Molecule B</div>
            <div id="mol2" class="molecule"></div>
        </div>
    </div>
</div>

<div class="panel">
    <div class="layer">
        <label>
            <input type="checkbox" value="complete_identity">
            Complete Identity
        </label>
    </div>

    <div class="layer">
        <label>
            <input type="checkbox" value="isotope">
            Isotopes Independence
        </label>
    </div>

    <div class="layer">
        <label>
            <input type="checkbox" value="salt">
            Salts Independence
        </label>
    </div>

    <div class="layer">
        <label>
            <input type="checkbox" value="charge">
            Charges Independence
        </label>
    </div>

    <div class="layer">
        <label>
            <input type="checkbox" value="double_bond">
            Double Bonds Independence
        </label>
    </div>

    <div class="layer">
        <label>
            <input type="checkbox" value="cis_trans">
            Cis/Trans Independence
        </label>
    </div>

    <div class="layer">
        <label>
            <input type="checkbox" value="tautomer">
            Tautomer Independence
        </label>
    </div>

    <div class="layer">
        <label>
            <input type="checkbox" value="substituent">
            Substituent Independence
        </label>
    </div>
</div>

</div>

<script src="js/scripts.js"></script>

</body>
</html>
