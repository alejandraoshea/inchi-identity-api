<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InChI Explorer</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/@rdkit/rdkit/dist/RDKit_minimal.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>
</head>

<body>

<div class="container">
    <div class="panel">
        <div class="title">InChI Identity Levels Comparison</div><br>

        <div class="tabs">
            <button class="tab active" data-mode="compare">Compare</button>
            <button class="tab" data-mode="advanced">Advanced</button>
            <button class="tab" data-mode="files">Files</button>
        </div>

        <div id="mode-compare" class="tab-content active">
            <textarea id="inchi1" placeholder="Molecule A (InChI)"></textarea>
            <textarea id="inchi2" placeholder="Molecule B (InChI)"></textarea>
            <button onclick="compare()">Compare</button>
        </div>

        <div id="mode-advanced" class="tab-content">
            <textarea id="inchi1_adv" placeholder="Molecule A (InChI)"></textarea>
            <textarea id="inchi2_adv" placeholder="Molecule B (InChI)"></textarea>
            <button onclick="compare(true)">Compare</button>
        </div>

        <div id="mode-files" class="tab-content">
            <div id="file-results"></div>
        </div>
    </div>

    <div class="panel center">
        <div class="molecule-card">
            <div class="molecule-header">Molecule A</div>
            <div id="mol1" class="molecule"></div>
        </div>
        <div class="molecule-card">
            <div class="molecule-header">Molecule B</div>
            <div id="mol2" class="molecule"></div>
        </div>
    </div>
    <div id="layers-compare" class="layers-container">
        <div class="layer" data-key="complete_identity">Complete Identity</div>
        <div class="layer" data-key="isotope">Isotope Independence</div>
        <div class="layer" data-key="salt">Salt Independence</div>
        <div class="layer" data-key="charge">Charge Independence</div>
        <div class="layer" data-key="double_bond">Double Bond Independence</div>
        <div class="layer" data-key="stereo_cis_trans">Cis/Trans Independence</div>
        <div class="layer" data-key="tautomer">Tautomer Independence</div>
        <div class="layer" data-key="substituent">Substituent Independence</div>
    </div>

    <div id="layers-advanced" class="layers-container" style="display:none;">
        <div class="layer">
            <label>
                <input type="checkbox" class="level-checkbox" value="complete_identity">
                <span class="layer-label">Complete Identity</span>
            </label>
        </div>
        <div class="layer">
            <label>
                <input type="checkbox" class="level-checkbox" value="isotope">
                <span class="layer-label">Isotope Idenpendence</span>
            </label>
        </div>
        <div class="layer">
            <label>
                <input type="checkbox" class="level-checkbox" value="salt">
                <span class="layer-label">Salt Idenpendence</span>
            </label>
        </div>
        <div class="layer">
            <label>
                <input type="checkbox" class="level-checkbox" value="charge">
                <span class="layer-label">Charge Idenpendence</span>
            </label>
        </div>
        <div class="layer">
            <label>
                <input type="checkbox" class="level-checkbox" value="double_bond"> 
                <span class="layer-label">Double Bond Idenpendence</span>
            </label>
        </div>
        <div class="layer">
            <label>
                <input type="checkbox" class="level-checkbox" value="stereo_cis_trans">
                <span class="layer-label">Cis/Trans Idenpendence</span>
            </label>
        </div>
        <div class="layer">
            <label>
                <input type="checkbox" class="level-checkbox" value="tautomer">
                <span class="layer-label">Tautomer Idenpendence</span>
            </label>
        </div>
        <div class="layer">
            <label>
                <input type="checkbox" class="level-checkbox" value="substituent">
                <span class="layer-label">Substituent Idenpendence</span>
            </label>
        </div>
    </div>

</div>

<div id="toast-container"></div>

<script src="js/scripts.js"></script>

</body>
</html>
