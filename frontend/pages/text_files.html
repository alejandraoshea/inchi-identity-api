<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InChI Identity Layers</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="icon" type="image/x-icon" href="/frontend/assets/svg/component.ico">
<script src="https://unpkg.com/@rdkit/rdkit/dist/RDKit_minimal.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>
</head>
<body>
    <div class="header">
        <div class="title">Metaboid Identity Comparison</div>
        <div class="nav">
            <a href="compare.html">Compare</a>
            <a href="mix_criteria.html">Advanced</a>
            <div class="dropdown">
                <span class="dropdown-toggle">Files ▾</span>
                <div class="dropdown-menu">
                    <a href="text_files.html">Text</a>
                    <a href="mgf_files.html">MGF</a>
                </div>
            </div>
        </div>
        <div></div>
    </div>
    <div class="container">
        <div class="panel">
            <div class="title-section">Compare Files</div>
            <p class="subtitle">Upload two text files with one InChI/SMILES per line.</p>
            <div class="file-upload">
                <label class="file-btn"><input type="file" id="file1" hidden accept=".txt,.inchi"><span class="file-btn-name">Upload File A</span></label>
                <label class="file-btn"><input type="file" id="file2" hidden accept=".txt,.inchi"><span class="file-btn-name">Upload File B</span></label>
                <select id="mode-select">
                    <option value="pairwise">1-to-1 (line by line)</option>
                    <option value="cross">All vs All (M × N)</option>
                </select>
                <button id="compare-files-btn">Compare Files</button>
            </div>
        </div>
        <div class="panel file-results-panel">
            <div class="layers-section-title">Results</div>
            <div id="file-results-container"></div>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="../js/ui.js"></script>
    <script src="../js/visualize.js"></script>
    <script src="../js/compare.js"></script>
    <script src="../js/files.js"></script>
    <script>markActiveNav();</script>
</body>
</html>
