<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InChI Identity Levels</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="icon" type="image/x-icon" href="/frontend/assets/svg/component.ico">
<script src="https://unpkg.com/@rdkit/rdkit/dist/RDKit_minimal.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>
</head>
<body>
    <div class="header">
        <div class="title">Metaboid Identity Comparison</div>
        <div class="nav">
            <a href="compare.html">Compare</a>
            <a href="mix_criteria.html">Advanced</a>
            <div class="dropdown">
                <span class="dropdown-toggle">Files ▾</span>
                <div class="dropdown-menu">
                    <a href="text_files.html">Text</a>
                    <a href="mgf_files.html">MGF</a>
                </div>
            </div>
        </div>
        <div></div>
    </div>
    <div class="container">
        <div class="panel">
            <div class="title-section">Compare Molecules</div>
            <textarea id="inchi1" placeholder="Molecule A"></textarea>
            <textarea id="inchi2" placeholder="Molecule B"></textarea>
            <button data-compare onclick="compare()">Compare</button>
        </div>
        <div class="panel center">
            <div class="molecule-card">
                <div class="molecule-header">Molecule A</div>
                <div id="mol1" class="molecule"></div>
            </div>
            <div class="molecule-card">
                <div class="molecule-header">Molecule B</div>
                <div id="mol2" class="molecule"></div>
            </div>
        </div>
        <div id="layers-compare" class="panel">
            <div class="layers-section-title">Identity Layers</div>
            <div class="layer" data-key="complete_identity"><span class="layer-label">Complete Identity</span></div>
            <div class="layer" data-key="isotope"><span class="layer-label">Isotope Independence</span></div>
            <div class="layer" data-key="salt"><span class="layer-label">Salt Independence</span></div>
            <div class="layer" data-key="charge"><span class="layer-label">Charge Independence</span></div>
            <div class="layer" data-key="double_bond"><span class="layer-label">Double Bond Independence</span></div>
            <div class="layer" data-key="stereo_cis_trans"><span class="layer-label">Cis/Trans Independence</span></div>
            <div class="layer" data-key="tautomer"><span class="layer-label">Tautomer Independence</span></div>
            <div class="layer" data-key="substituent"><span class="layer-label">Substituent Independence</span></div>
        </div>
    </div>
    <div id="toast-container"></div>
    <script src="../js/ui.js"></script>
    <script src="../js/visualize.js"></script>
    <script src="../js/compare.js"></script>
    <script>initTextareas(); markActiveNav();</script>
</body>
</html>
