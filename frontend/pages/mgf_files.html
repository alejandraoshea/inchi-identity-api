<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InChI Identity Layers</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="icon" type="image/x-icon" href="/frontend/assets/svg/component.ico">
<script src="https://unpkg.com/@rdkit/rdkit/dist/RDKit_minimal.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/3Dmol/2.0.4/3Dmol-min.js"></script>
</head>
<body>
    <div class="header">
        <div class="title">Metaboid Identity Comparison</div>
        <div class="nav">
            <a href="compare.html">Compare</a>
            <a href="mix_criteria.html">Advanced</a>
            <div class="dropdown">
                <span class="dropdown-toggle">Files ▾</span>
                <div class="dropdown-menu">
                    <a href="text_files.html">Text</a>
                    <a href="mgf_files.html">MGF</a>
                </div>
            </div>
        </div>
        <div></div>
    </div>

    <div class="container">
        <div class="panel">
            <div class="title-section">Compare MGF Files</div>
            <p class="subtitle">Upload two MGF files containing either InChIs or SMILES.</p>

            <div class="file-upload">
                <label class="file-btn">
                    <input type="file" id="mgf-file1" hidden accept=".mgf">
                    <span class="file-btn-name">Upload File A</span>
                </label>
                <label class="file-btn">
                    <input type="file" id="mgf-file2" hidden accept=".mgf">
                    <span class="file-btn-name">Upload File B</span>
                </label>
            </div>

            <label style="font-size:12px;font-weight:500;color:var(--muted);">Identity Layer</label>
            <select id="mgf-layer">
                <option value="COMPLETE_IDENTITY">Complete Identity</option>
                <option value="ISOTOPIC_INDEPENDENCE">Isotope Independence</option>
                <option value="SALTS_INDEPENDENCE">Salt Independence</option>
                <option value="CHARGES_INDEPENDENCE">Charge Independence</option>
                <option value="DOUBLE_BONDS_INDEPENDENCE">Double Bond Independence</option>
                <option value="STEREOCHEMICAL_CIS_TRANS_INDEPENDENCE">Cis/Trans Independence</option>
                <option value="TAUTOMER_INDEPENDENCE">Tautomer Independence</option>
            </select>

            <label style="font-size:12px;font-weight:500;color:var(--muted);">Output Filename</label>
            <div style="display:flex;align-items:center;gap:6px;">
                <input type="text" id="mgf-output-name" placeholder="unified_output"
                    style="flex:1;padding:9px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);
                    font-size:13px;font-family:var(--font-mono);background:#fafbfc;color:var(--text);">
                <span style="font-size:12px;color:var(--muted);flex-shrink:0;">.mgf</span>
            </div>

            <button id="mgf-compare-btn">Compare Files</button>
        </div>

        <div class="panel file-results-panel">
            <div class="layers-section-title">Results</div>
            <div id="mgf-results-container">
                <div class="mgf-empty-state">
                    <div class="mgf-empty-icon">⬡</div>
                    <div class="mgf-empty-text">Upload two MGF files and click Compare to see results</div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="../js/ui.js"></script>
    <script src="../js/visualize.js"></script>
    <script src="../js/compare.js"></script>
    <script src="../js/mgf_files.js"></script>
    <script>markActiveNav();</script>
</body>
</html>
