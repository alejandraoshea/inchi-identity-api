server {
    listen 80;
    server_name test.example.com;

    client_max_body_size 25m;

    # API traffic stays on the same domain and is proxied to Gunicorn.
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # The frontend owns the root URL. Change this path to the deployed
    # frontend entry route if it is not /pages/compare.html.
    location = / {
        return 302 /pages/compare.html;
    }

    # Frontend static files and SPA fallback.
    root /var/www/inchi-identity-app;
    index pages/compare.html index.html;

    location / {
        try_files $uri $uri/ /pages/compare.html;
    }
}
