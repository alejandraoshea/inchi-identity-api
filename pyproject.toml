[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "identity-levels-inchi"
version = "0.1.0"
description = "Identity levels for InChI comparison"
readme = "README.md"
requires-python = ">=3.12"

[project.scripts]
inchi = "backend.inchi.cli:main"

[tool.setuptools.packages.find]
where = ["."]
