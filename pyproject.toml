[project]
name = "identity-levels-inchi"
version = "0.1.0"
description = "InChI identity comparison across multiple chemical abstraction levels"
authors = [
    { name = "alejandraoshea", email = "alejandraosheafdez@gmail.com" }
]
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "numpy>=1.23",
    "pandas",
    "requests",
    "flask",
    "flask-cors",
    "python-dotenv",
    "pillow",
    "py3Dmol", 
    "requests"
]

keywords = ["chemistry", "inchi", "rdkit", "lipids", "cheminformatics"]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project.scripts]
inchi = "backend.cli.cli:main"

[tool.setuptools.packages.find]
where = ["."]